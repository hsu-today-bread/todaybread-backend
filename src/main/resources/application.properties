spring.application.name=server

# ============================================================
# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.todaybread.server
springdoc.paths-to-match=/api/**

# ============================================================
# DataSource (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/${MYSQL_DATABASE:todaybread}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${MYSQL_USER:todaybread}
spring.datasource.password=${MYSQL_PASSWORD:todaybread}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ============================================================
# JWT
jwt.secret=${JWT_SECRET:todaybread-dev-jwt-secret-key-at-least-32-bytes}
jwt.access-token-expiration=1800000
jwt.refresh-token-expiration=604800000

# ============================================================
# File Upload
app.file.upload-dir=${UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB

# ============================================================
# Toss Payments
toss.payment.secret-key=${TOSS_SECRET_KEY:}
toss.payment.client-key=${TOSS_CLIENT_KEY:}
toss.payment.base-url=https://api.tosspayments.com

# ============================================================
# Pending order scheduler
order.expiry.timeout-minutes=10
order.expiry.scheduler-interval-ms=60000
order.expiry.batch-size=100

# ============================================================
# User recovery cleanup scheduler
user.recovery.cleanup-interval-ms=3600000
