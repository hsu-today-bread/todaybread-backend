spring.application.name=server

# OPEN API SWAGGER
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.todaybread.server
springdoc.paths-to-match=/api/**

# DataSource Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/todaybread?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=todaybread
spring.datasource.password=todaybread
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# HikariCP Configuration (Explicit settings to prevent undefined/unknown warnings)
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.auto-commit=false

# Hibernate Specific settings to clarify Isolation and Dialect
spring.jpa.properties.hibernate.connection.isolation=2
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Flyway Configuration (Delegate to DDL-Auto for now)
# ??? ?????? ? ? ??
spring.flyway.enabled=false